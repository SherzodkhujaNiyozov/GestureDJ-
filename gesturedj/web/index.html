<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GestureDJ</title>
<style>
  /* Shriftlar LOKAL (fonts/ papkasida) — oyna ochilganda internetga
     umuman bormaydi. Maxfiylik: hech qanday tashqi CDN chaqiruvi yo'q. */
  @import url('fonts.css');

  /* GestureDJ design system tokens (claude.ai/design handoff) */
  :root {
    --bg: #14122E;          /* indigo-950 — sunken ground */
    --surface: #1E1B4B;     /* indigo-900 — brand anchor / cards */
    --surface-2: #242155;   /* indigo-850 — raised */
    --accent: #4F46E5;      /* violet-600 */
    --accent-soft: #6366F1; /* violet-500 — primary anchor */
    --green: #22C55E;       /* green-500 — signal */
    --red: #EF4444;
    --amber: #F59E0B;
    --text: #ECECFF;        /* ink-50 */
    --muted: #9897C4;       /* ink-400 */
    --border: rgba(255, 255, 255, 0.08);
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'Manrope', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    padding: 24px;
    user-select: none;
  }

  header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  header svg.logo { flex-shrink: 0; }
  header h1 { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  header .sub { color: var(--muted); font-size: 12px; }

  .lang-select {
    margin-left: auto;
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--text); background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 7px 10px; cursor: pointer;
    transition: background-color 200ms;
  }
  .lang-select:hover { background: rgba(165,180,252,.15); }
  .lang-select:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--accent-soft); }

  .badge {
    padding: 6px 16px; border-radius: 999px; font-weight: 600; font-size: 13px;
    transition: background-color 250ms, color 250ms;
  }
  .badge.standby { background: rgba(165,180,252,.12); color: var(--muted); }
  .badge.active  { background: rgba(34,197,94,.15); color: var(--green); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .card h2 {
    font-family: var(--font-display);
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* --- Jonli holat --- */
  .gesture-now {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface-2); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px;
  }
  .gesture-now .name { font-size: 18px; font-weight: 600; }
  .gesture-now .desc { color: var(--muted); font-size: 12px; }

  .volume-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .volume-bar {
    flex: 1; height: 10px; border-radius: 999px;
    background: rgba(165,180,252,.12); overflow: hidden;
  }
  .volume-bar .fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-soft), var(--green));
    transition: width 120ms linear;
  }
  .volume-num { font-family: var(--font-mono); font-weight: 600; min-width: 48px; text-align: right; }
  .mute-tag {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px;
    background: rgba(239,68,68,.15); color: var(--red); display: none;
  }
  .mute-tag.on { display: inline-block; }

  .meter { margin-bottom: 14px; }
  .meter .top { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .meter .top b { color: var(--text); font-family: var(--font-mono); font-weight: 600; }
  .meter .track { position: relative; height: 6px; border-radius: 999px; background: rgba(165,180,252,.12); }
  .meter .track .fill {
    height: 100%; border-radius: 999px; background: var(--accent-soft);
    transition: width 120ms linear;
  }
  .meter .track .mark {
    position: absolute; top: -3px; width: 2px; height: 12px;
    background: var(--amber); border-radius: 1px;
  }

  /* --- Sozlamalar --- */
  .setting { margin-bottom: 14px; }
  .setting .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
  .setting label { font-size: 13px; }
  .setting .hint { color: var(--muted); font-size: 11px; }
  .setting .val { font-family: var(--font-mono); font-weight: 600; color: var(--accent-soft); }

  input[type=range] {
    width: 100%; -webkit-appearance: none; appearance: none; height: 6px;
    border-radius: 999px; background: rgba(165,180,252,.15); cursor: pointer; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent-soft); border: 3px solid var(--surface);
    transition: background-color 200ms;
  }
  input[type=range]:hover::-webkit-slider-thumb { background: var(--green); }
  input[type=range]:focus-visible { box-shadow: 0 0 0 2px var(--accent-soft); }

  .autostart {
    display: flex; align-items: center; gap: 10px; cursor: pointer;
    margin-top: 6px; padding: 10px 12px; border-radius: 10px;
    background: var(--surface-2); font-size: 13px;
    transition: background-color 200ms;
  }
  .autostart:hover { background: rgba(165,180,252,.15); }
  .autostart input { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }

  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  button {
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
    transition: background-color 200ms, opacity 200ms;
  }
  .btn-save { background: var(--green); color: #052E16; flex: 1; }
  .btn-save:hover { background: #4ADE80; }
  .btn-reset { background: rgba(165,180,252,.12); color: var(--muted); }
  .btn-reset:hover { background: rgba(239,68,68,.15); color: var(--red); }
  .save-note { font-size: 11px; color: var(--green); margin-top: 8px; height: 16px; transition: opacity 400ms; opacity: 0; }
  .save-note.show { opacity: 1; }

  /* --- Gesture xaritasi --- */
  .gestures { grid-column: 1 / -1; }
  .gesture-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }
  .gitem {
    background: var(--surface-2); border-radius: 12px; padding: 12px 14px;
    border: 1px solid transparent; transition: border-color 200ms;
  }
  .gitem.now { border-color: var(--green); }
  .gitem .t { font-weight: 600; font-size: 13px; }
  .gitem .d { color: var(--muted); font-size: 11px; }

  footer {
    margin-top: 20px; color: var(--muted); font-size: 11px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .btn-quit {
    display: inline-flex; align-items: center; gap: 7px; flex-shrink: 0;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    padding: 8px 16px; border-radius: 10px; cursor: pointer;
    background: rgba(239,68,68,.12); color: #FCA5A5;
    border: 1px solid rgba(239,68,68,.25);
    transition: background-color 200ms, color 200ms;
  }
  .btn-quit:hover { background: var(--red); color: #fff; }
  .btn-quit:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--red); }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>

      DEACTIVATE_HOLD_SEC: { l: "無効化の時間", h: "人差し指, 秒" },
      ACTION_HOLD_SEC: { l: "操作の時間", h: "握りこぶし/ビーク長押し, 秒" },
      PINCH_MIN: { l: "ピンチ最小", h: "この距離で音量0%" },
      PINCH_MAX: { l: "ピンチ最大", h: "この距離で音量100%" },
      SMOOTHING_ALPHA: { l: "スムージング", h: "小さいほど滑らか・遅い" },
      BEAK_CLUSTER_MAX: { l: "ビーク感度", h: "指先の近さのしきい値" },
      ACTIVE_FPS: { l: "アクティブFPS", h: "有効時のフレームレート" },
      STANDBY_FPS: { l: "待機FPS", h: "CPU節約のため低め" },
    },
  },
  ru: {
    ui: {
      subtitle: "Управление звуком жестами",
      standby: "ОЖИДАНИЕ", active: "АКТИВНО", live: "Статус в реальном времени", settings: "Настройки",
      gestureMap: "Карта жестов", autostart: "Запускать с Windows",
      save: "Сохранить", reset: "Сбросить настройки", quit: "Выйти из приложения",
      saved: "Сохранено — применено сразу",
      footerNote: "Настройки в config.json · при закрытии (X) приложение продолжает работать в трее",
      mute: "БЕЗ ЗВУКА", waitingHand: "Ожидание руки…", handVisible: "Рука видна",
      notDetected: "Не определено",
      pinchMeter: "Pinch (расстояние громкости)",
      beakMeter: "Beak (близость кончиков — ниже линии = без звука)",
      spreadMeter: "Spread (расстояние между пальцами)",
    },
    g: {
      thumbs_up: { t: "Большой палец вверх", d: "Активация (1с)" },
      index_up: { t: "Указательный палец", d: "Вернуть в трей (1с)" },
      fist: { t: "Кулак", d: "Воспроизведение / Пауза" },
      beak: { t: "Beak (кончики вместе)", d: "Звук вкл/выкл" },
      open_palm: { t: "Открытая ладонь", d: "Не назначено" },
      volume: { t: "Pinch", d: "Громкость (большой + указательный)" },
    },
    s: {
      ACTIVATE_HOLD_SEC: { l: "Время активации", h: "удержание большого пальца, с" },
      DEACTIVATE_HOLD_SEC: { l: "Время деактивации", h: "указательный палец, с" },
      ACTION_HOLD_SEC: { l: "Время действия", h: "удержание кулака/beak, с" },
      PINCH_MIN: { l: "Pinch минимум", h: "это расстояние = громкость 0%" },
      PINCH_MAX: { l: "Pinch максимум", h: "это расстояние = громкость 100%" },
      SMOOTHING_ALPHA: { l: "Сглаживание", h: "меньше = плавнее, медленнее" },
      BEAK_CLUSTER_MAX: { l: "Чувствительность beak", h: "порог близости кончиков" },
      ACTIVE_FPS: { l: "Активный FPS", h: "частота кадров при активности" },
      STANDBY_FPS: { l: "FPS ожидания", h: "низкий для экономии CPU" },
    },
  },
};

const SETTINGS_META = {
  ACTIVATE_HOLD_SEC:   { min: 0.3,  max: 3,   step: 0.1 },
  DEACTIVATE_HOLD_SEC: { min: 0.3,  max: 3,   step: 0.1 },
  ACTION_HOLD_SEC:     { min: 0.2,  max: 2,   step: 0.1 },
  PINCH_MIN:           { min: 0,    max: 0.5, step: 0.01 },
  PINCH_MAX:           { min: 0.5,  max: 1.5, step: 0.01 },
  SMOOTHING_ALPHA:     { min: 0.05, max: 1,   step: 0.05 },
  BEAK_CLUSTER_MAX:    { min: 0.1,  max: 0.6, step: 0.01 },
  ACTIVE_FPS:          { min: 5,    max: 30,  step: 1 },
  STANDBY_FPS:         { min: 1,    max: 15,  step: 1 },
};

let lang = "uz";
let cfg = {};
let lastGesture = null;
let lastFps = null;

function el(id) { return document.getElementById(id); }
function fmt(v) { return Number.isInteger(v) ? v : (+v).toFixed(2).replace(/0$/, ""); }
function pct(v, max) { return Math.min(100, Math.max(0, v / max * 100)) + "%"; }
function t(key) { return (I18N[lang]?.ui[key]) ?? I18N.uz.ui[key] ?? key; }
function gtext(key) { return (I18N[lang]?.g[key]) ?? I18N.uz.g[key]; }
function stext(key) { return (I18N[lang]?.s[key]) ?? I18N.uz.s[key]; }

function buildSettings() {
  const root = el("settings");
  root.innerHTML = "";
  for (const k of SKEYS) {
    const m = SETTINGS_META[k];
    const tr = stext(k);
    const div = document.createElement("div");
    div.className = "setting";
    div.innerHTML =
      `<div class="top"><label for="in_${k}">${tr.l} <span class="hint">· ${tr.h}</span></label>` +
      `<span class="val" id="val_${k}">${fmt(cfg[k])}</span></div>` +
      `<input type="range" id="in_${k}" min="${m.min}" max="${m.max}" step="${m.step}" value="${cfg[k]}">`;
    root.appendChild(div);
    el("in_" + k).addEventListener("input", (e) => {
      el("val_" + k).textContent = fmt(+e.target.value);
    });
  }
}

function buildGestureList(current) {
  const root = el("gestureList");
  root.innerHTML = "";
  for (const key of GKEYS) {
    const g = gtext(key);
    const div = document.createElement("div");
    div.className = "gitem" + (key === current ? " now" : "");
    div.innerHTML = `<div class="t">${g.t}</div><div class="d">${g.d}</div>`;
    root.appendChild(div);
  }
}

function setMark(id, value, scaleMax) { el(id).style.left = pct(value, scaleMax); }

function refreshMarks() {
  setMark("pinchMin", cfg.PINCH_MIN, 1.5);
  setMark("pinchMax", cfg.PINCH_MAX, 1.5);
  setMark("beakMark", cfg.BEAK_CLUSTER_MAX, 1.0);
}

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach((e) => {
    e.textContent = t(e.dataset.i18n);
  });
  buildSettings();
  buildGestureList(lastGesture);
  renderSubline();
  // badge / gestureName / gestureDesc keyingi poll tick'da yangilanadi (200ms)
}

function renderSubline() {
  el("subline").textContent = t("subtitle") + (lastFps ? " · " + lastFps + " FPS" : "");
}

async function poll() {
  try {
    const s = await window.pywebview.api.get_state();
    lastGesture = s.gesture || null;
    lastFps = s.fps || lastFps;

    const badge = el("badge");
    if (s.state === "active") { badge.className = "badge active"; badge.textContent = t("active"); }
    else { badge.className = "badge standby"; badge.textContent = t("standby"); }

    const g = s.gesture && gtext(s.gesture);
    el("gestureName").textContent = g ? g.t : (s.hand ? t("notDetected") : "—");
    el("gestureDesc").textContent = g ? g.d : (s.hand ? t("handVisible") : t("waitingHand"));
    buildGestureList(lastGesture);

    if (typeof s.volume === "number") {
      el("volFill").style.width = (s.volume * 100).toFixed(0) + "%";
      el("volNum").textContent = (s.volume * 100).toFixed(0) + "%";
    }
    el("muteTag").className = "mute-tag" + (s.muted ? " on" : "");
    renderSubline();

    const m = [["pinch", 1.5], ["beak", 1.0], ["spread", 1.0]];
    for (const [k, max] of m) {
      const v = s[k];
      el(k + "Val").textContent = v == null ? "—" : (+v).toFixed(2);
      el(k + "Fill").style.width = v == null ? "0%" : pct(v, max);
    }
  } catch (e) { /* api hali tayyor emas */ }
}

let pollTimer = null;
function setPolling(on) {
  if (on && !pollTimer) pollTimer = setInterval(poll, 200);
  if (!on && pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

async function init() {
  cfg = await window.pywebview.api.get_config();
  lang = await window.pywebview.api.get_language();
  if (!I18N[lang]) lang = "uz";
  el("langSel").value = lang;
  applyI18n();
  refreshMarks();
  setPolling(true);

  el("langSel").addEventListener("change", async (e) => {
    lang = await window.pywebview.api.set_language(e.target.value);
    if (!I18N[lang]) lang = "uz";
    applyI18n();
    refreshMarks();
  });

  const chk = el("autostartChk");
  chk.checked = await window.pywebview.api.get_autostart();
  chk.addEventListener("change", async () => {
    chk.checked = await window.pywebview.api.set_autostart(chk.checked);
  });

  el("btnSave").addEventListener("click", async () => {
    const values = {};
    for (const k of SKEYS) values[k] = +el("in_" + k).value;
    cfg = await window.pywebview.api.set_config(values);
    refreshMarks();
    const note = el("saveNote");
    note.classList.add("show");
    setTimeout(() => note.classList.remove("show"), 2000);
  });

  el("btnReset").addEventListener("click", async () => {
    cfg = await window.pywebview.api.reset_config();
    buildSettings();
    refreshMarks();
  });

  el("btnQuit").addEventListener("click", () => {
    setPolling(false);
    window.pywebview.api.quit_app();
  });
}

window.addEventListener("pywebviewready", init);
</script>
